<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 880" width="960" height="880">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica Neue, sans-serif; }
  </style>
  <defs>
    <marker id="ao" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#71717a"/>
    </marker>
    <marker id="ao-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#10a37f"/>
    </marker>
  </defs>

  <rect width="960" height="880" fill="#ffffff"/>

  <text x="480" y="30" text-anchor="middle" fill="#0d0d0d" font-size="18" font-weight="600">OpenAI Skill System</text>
  <text x="480" y="50" text-anchor="middle" fill="#6e6e80" font-size="12">Phase 1: Discovery &amp; Index  |  Phase 2: Load &amp; Execute</text>

  <text x="30" y="74" fill="#6e6e80" font-size="12" font-weight="600">PHASE 1: Discovery &amp; Index</text>

  <rect x="30" y="84" width="175" height="56" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="30" y="84" width="4" height="56" rx="2" ry="2" fill="#10a37f"/>
  <text x="117" y="106" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">SandboxAgent</text>
  <text x="117" y="123" text-anchor="middle" fill="#6e6e80" font-size="10">capabilities=[Shell(), Skills()]</text>

  <line x1="205" y1="112" x2="240" y2="112" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="245" y="84" width="165" height="56" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="327" y="106" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Skills (Capability)</text>
  <text x="327" y="123" text-anchor="middle" fill="#6e6e80" font-size="10">lazy_from=LocalDirLazySkillSource</text>

  <line x1="410" y1="112" x2="445" y2="112" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="450" y="84" width="175" height="56" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="450" y="84" width="4" height="56" rx="2" ry="2" fill="#1d4ed8"/>
  <text x="537" y="106" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Host Directory</text>
  <text x="537" y="123" text-anchor="middle" fill="#6e6e80" font-size="10">.agents/skills/*/SKILL.md</text>

  <line x1="625" y1="112" x2="660" y2="112" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="665" y="84" width="265" height="56" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="665" y="84" width="4" height="56" rx="2" ry="2" fill="#10a37f"/>
  <text x="797" y="106" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">System Prompt</text>
  <text x="797" y="123" text-anchor="middle" fill="#6e6e80" font-size="10">"Available skills" list injected each turn</text>

  <line x1="30" y1="160" x2="930" y2="160" stroke="#e5e5e5" stroke-width="1.5" stroke-dasharray="6,4"/>

  <text x="30" y="180" fill="#6e6e80" font-size="12" font-weight="600">PHASE 2: Load &amp; Execute</text>

  <rect x="30" y="194" width="125" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="30" y="194" width="4" height="46" rx="2" ry="2" fill="#1d4ed8"/>
  <text x="92" y="214" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">User</text>
  <text x="92" y="230" text-anchor="middle" fill="#6e6e80" font-size="10">"Use X skill..."</text>

  <line x1="155" y1="217" x2="190" y2="217" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="195" y="194" width="175" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="282" y="214" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Model Decision</text>
  <text x="282" y="230" text-anchor="middle" fill="#6e6e80" font-size="10">Calls load_skill("X")</text>

  <line x1="370" y1="217" x2="405" y2="217" stroke="#10a37f" stroke-width="1.5" marker-end="url(#ao-green)"/>

  <rect x="410" y="194" width="180" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="410" y="194" width="4" height="46" rx="2" ry="2" fill="#10a37f"/>
  <text x="500" y="214" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">_LoadSkillTool</text>
  <text x="500" y="230" text-anchor="middle" fill="#6e6e80" font-size="10">Checks if already loaded</text>

  <line x1="590" y1="217" x2="625" y2="217" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="630" y="194" width="160" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="710" y="214" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Host → Sandbox</text>
  <text x="710" y="230" text-anchor="middle" fill="#6e6e80" font-size="10">Copy SKILL.md + files</text>

  <line x1="790" y1="217" x2="825" y2="217" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="830" y="194" width="100" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <text x="880" y="214" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Return</text>
  <text x="880" y="230" text-anchor="middle" fill="#6e6e80" font-size="10">{status:ok}</text>

  <line x1="880" y1="240" x2="880" y2="270" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="600" y="274" width="560" height="46" rx="8" ry="8" fill="#fafafa" stroke="#e5e5e5" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="880" y="294" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Key: ToolResult = {"status": "loaded"}</text>
  <text x="880" y="312" text-anchor="middle" fill="#6e6e80" font-size="11">SKILL.md content has NOT entered conversation yet — model must Read() it explicitly</text>

  <line x1="880" y1="320" x2="880" y2="344" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="620" y="348" width="280" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="620" y="348" width="4" height="46" rx="2" ry="2" fill="#10a37f"/>
  <text x="760" y="368" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Model Calls Read()</text>
  <text x="760" y="384" text-anchor="middle" fill="#6e6e80" font-size="10">Read(".agents/skills/.../SKILL.md")</text>

  <line x1="760" y1="394" x2="400" y2="394" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="170" y="348" width="230" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="170" y="348" width="4" height="46" rx="2" ry="2" fill="#10a37f"/>
  <text x="285" y="368" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Sandbox Workspace</text>
  <text x="285" y="384" text-anchor="middle" fill="#6e6e80" font-size="10">SKILL.md + scripts/ + references/</text>

  <line x1="170" y1="371" x2="110" y2="371" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="30" y="348" width="80" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="30" y="348" width="4" height="46" rx="2" ry="2" fill="#10a37f"/>
  <text x="70" y="368" text-anchor="middle" fill="#0d0d0d" font-size="12" font-weight="600">Read</text>
  <text x="70" y="384" text-anchor="middle" fill="#6e6e80" font-size="10">result</text>

  <line x1="70" y1="394" x2="70" y2="420" stroke="#71717a" stroke-width="1.5" marker-end="url(#ao)"/>

  <rect x="30" y="424" width="430" height="46" rx="8" ry="8" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <rect x="30" y="424" width="4" height="46" rx="2" ry="2" fill="#10a37f"/>
  <text x="245" y="444" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Model Executes Per SKILL.md</text>
  <text x="245" y="460" text-anchor="middle" fill="#6e6e80" font-size="10">read transcripts, call scripts, generate report</text>

  <rect x="480" y="424" width="450" height="46" rx="8" ry="8" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="705" y="444" text-anchor="middle" fill="#0d0d0d" font-size="12" font-weight="600">No contextModifier</text>
  <text x="705" y="460" text-anchor="middle" fill="#6e6e80" font-size="11">Tool permissions are static (Agent.tools + guardrails) — not dynamically granted</text>

  <rect x="30" y="490" width="900" height="50" rx="8" ry="8" fill="#fafafa" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="480" y="511" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Core Difference: Push vs Pull</text>
  <text x="480" y="529" fill="#6e6e80" font-size="12">Anthropic: newMessages pushes SKILL.md transparently — OpenAI: Read() pulls from workspace explicitly</text>

  <rect x="30" y="554" width="900" height="50" rx="8" ry="8" fill="#fafafa" stroke="#e5e5e5" stroke-width="1"/>
  <text x="480" y="575" text-anchor="middle" fill="#0d0d0d" font-size="13" font-weight="600">Same Information Reaches Model, Different Abstraction</text>
  <text x="480" y="593" fill="#6e6e80" font-size="12">Capability = composable plugin | Sandbox = isolation | Progressive: SKILL.md → scripts → assets</text>

  <rect x="30" y="618" width="900" height="34" rx="6" ry="6" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <text x="480" y="639" text-anchor="middle" fill="#6e6e80" font-size="12">Lazy loading: frontmatter index only at startup — full content loaded on demand</text>
</svg>
